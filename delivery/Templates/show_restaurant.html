<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Show Restaurant</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'show_restaurant.css' %}">
</head>
<body>

<table border="1">
    <thead>
        <tr>
            <th>Restaurant</th>
            <th>Picture</th>
            <th>Cuisine</th>
            <th>Rating</th>
            <th>Operations</th>
        </tr>
    </thead>

    <tbody>
        {% for r in restaurantList %}
        <tr>
            <td>{{ r.name }}</td>

            <td>
                <img src="{{ r.picture }}" width="150">
            </td>

            <td>{{ r.cuisine }}</td>

            <td>{{ r.rating }}</td>

            <td>
                <a href="{% url 'open_update_restaurant' r.id %}">
                    Update Restaurant
                </a><br>
                <a href="{% url 'delete_restaurant' r.id %}">
                    Delete Restaurant
                </a><br>
                <a href="{% url 'restaurant_menu' r.id %}">
    Show Menu
</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

</body>
</html>
